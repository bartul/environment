palette = 'gruvbox_dark'

[palettes.gruvbox_dark]
color_fg0 = '#fbf1c7'
color_bg1 = '#3c3836'
color_bg3 = '#665c54'
color_blue = '#458588'
color_aqua = '#689d6a'
color_green = '#98971a'
color_orange = '#d65d0e'
color_purple = '#b16286'
color_red = '#cc241d'
color_yellow = '#d79921'

[os]
disabled = false
style = "bg:color_orange fg:color_fg0"

[os.symbols]
Windows = "ˇ░Ź▓"
Ubuntu = "ˇ░Ľł"
SUSE = "´îö"
Raspbian = "ˇ░É┐"
Mint = "ˇ░úş"
Macos = "ˇ░ÇÁ"
Manjaro = "´îĺ"
Linux = "ˇ░îŻ"
Gentoo = "ˇ░úĘ"
Fedora = "ˇ░úŤ"
Alpine = "´îÇ"
Amazon = "´ë░"
Android = "ţťÄ"
Arch = "ˇ░úç"
Artix = "ˇ░úç"
EndeavourOS = "´ćŚ"
CentOS = "´îä"
Debian = "ˇ░úÜ"
Redhat = "ˇ▒äŤ"
RedHatEnterprise = "ˇ▒äŤ"
