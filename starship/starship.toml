tag_disabled = false

[git_state]
style = 'fg:color_fg1 bg:color_aqua'
format = '[ \($state( $progress_current/$progress_total)\) ]($style)'

[helm]
format = '[$symbol($version )]($style)'
style = 'bg:color_blue fg:color_fg1'
detect_files = ['helmfile.yaml', 'Chart.yaml', 'helmfile.yaml.gotmpl']
