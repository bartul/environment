[username]
show_always = true
style_user = "bg:color_orange fg:color_fg0"
style_root = "bg:color_orange fg:color_fg0"
format = '[ $user ]($style)'

[directory]
style = "fg:color_fg0 bg:color_yellow"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "ÔÇŽ/"

[directory.substitutions]
"Documents" = "ˇ░łÖ "
"Downloads" = "´ÇÖ "
"Music" = "ˇ░ŁÜ "
"Pictures" = "´Çż "
"Developer" = "ˇ░▓ő "

[git_branch]
symbol = "´Éś"
style = "bg:color_aqua"
format = '[[ $symbol $branch ](fg:color_fg0 bg:color_aqua)]($style)'

[git_status]
style = "bg:color_aqua"
format = '[[($all_status$ahead_behind )](fg:color_fg0 bg:color_aqua)]($style)'

[nodejs]
symbol = "ţťś"
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[c]
symbol = "ţś× "
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[cpp]
symbol = "ţśŁ "
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[rust]
symbol = "ţ×Ę"
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[golang]
symbol = "ţśž"
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[php]
symbol = "ţśł"
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[java]
symbol = "ţëľ"
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[kotlin]
symbol = "ţś┤"
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[haskell]
symbol = "ţśč"
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[python]
symbol = "ţść"
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[dotnet]
symbol = "ˇ░Ő« "
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'
detect_extensions = ["csproj", "fsproj", "xproj", "slnx"]

[docker_context]
symbol = "´îł"
style = "bg:color_bg3"
format = '[[ $symbol( $context) ](fg:#83a598 bg:color_bg3)]($style)'

[conda]
style = "bg:color_bg3"
format = '[[ $symbol( $environment) ](fg:#83a598 bg:color_bg3)]($style)'

[pixi]
style = "bg:color_bg3"
format = '[[ $symbol( $version)( $environment) ](fg:color_fg0 bg:color_bg3)]($style)'

[time]
disabled = false
time_format = "%R"
style = "bg:color_bg1"
format = '[[ ´É║ $time ](fg:color_fg0 bg:color_bg1)]($style)'

[line_break]
disabled = false

[character]
disabled = false
format = "$symbol"
success_symbol = '[ ´äá](bg:color_bg1)'
error_symbol = '[ ´äá](bg:color_bg1)'
vimcmd_symbol = '[ ´äü](bg:color_bg1)'
vimcmd_replace_one_symbol = '[ ´âČ](bg:color_bg1)'
vimcmd_replace_symbol = '[ ´âČ](bg:color_bg1)'
vimcmd_visual_symbol = '[ ´ëů](bg:color_bg1)'

[kubernetes]
disabled = false
format = '[$symbol$context ]($style)'
style = 'bg:color_orange fg:color_fg0'

[git_commit]
style = "fg:color_fg0 bg:color_aqua"
format = '[\($hash$tag\)]($style)'
tag_disabled = false

[git_state]
style = 'fg:color_fg0 bg:color_aqua'
format = '[ \($state( $progress_current/$progress_total)\) ]($style)'

[helm]
format = '[$symbol($version )]($style)'
style = 'bg:color_blue fg:color_fg0'
detect_files = ['helmfile.yaml', 'Chart.yaml', 'helmfile.yaml.gotmpl']
